    <linearGradient id="stem" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e7bda3" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#b87960" stop-opacity="0.48"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#a76756" flood-opacity="0.16"/>
    </filter>
    <g id="leafPair">
