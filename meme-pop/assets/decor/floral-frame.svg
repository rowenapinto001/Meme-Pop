        <ellipse cx="-46" cy="28" rx="31" ry="58" fill="url(#petal)" transform="rotate(228 -46 28)"/>
        <ellipse cx="-52" cy="-14" rx="31" ry="58" fill="url(#petal)" transform="rotate(276 -52 -14)"/>
        <ellipse cx="-28" cy="-44" rx="31" ry="58" fill="url(#petal)" transform="rotate(318 -28 -44)"/>
