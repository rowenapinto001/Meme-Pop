<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1600" preserveAspectRatio="none" aria-hidden="true">
  <defs>
    <radialGradient id="petal" cx="44%" cy="35%" r="70%">
      <stop offset="0" stop-color="#fff5ee"/>
      <stop offset="0.42" stop-color="#ffd5c8"/>
      <stop offset="1" stop-color="#f29b8b"/>
    </radialGradient>
    <radialGradient id="petalLight" cx="38%" cy="26%" r="74%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#ffe8df"/>
      <stop offset="1" stop-color="#ffc0b2"/>
    </radialGradient>
    <radialGradient id="center" cx="48%" cy="42%" r="62%">
