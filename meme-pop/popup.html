<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meme Pop</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <img src="assets/icons/icon48.png" alt="" class="popup-icon">
        <div>
          <h1>Meme Pop</h1>
          <p>Small jokes. Sudden appearances.</p>
        </div>
      </header>

      <form id="settingsForm" class="settings-form">
        <label class="toggle-row">
          <span>
            <strong>Enable Meme Pop</strong>
            <small>Let characters appear automatically.</small>
          </span>
          <input id="enabled" type="checkbox" role="switch">
        </label>

        <label class="field">
          <span>Theme</span>
          <select id="theme">
            <option value="random">Random</option>
            <option value="office">Office</option>
            <option value="coding">Coding</option>
            <option value="studying">Studying</option>
            <option value="gaming">Gaming</option>
          </select>
        </label>

        <label class="field">
          <span>Appearance frequency</span>
          <select id="intervalSeconds">
            <option value="10">Test mode: 10 seconds</option>
            <option value="60">1 minute</option>
            <option value="180">3 minutes</option>
            <option value="300">5 minutes</option>
            <option value="600">10 minutes</option>
          </select>
        </label>

        <label class="toggle-row compact">
          <span>
            <strong>Sound</strong>
            <small>Play a tiny pop when allowed by the page.</small>
          </span>
          <input id="soundEnabled" type="checkbox" role="switch">
        </label>

        <div class="button-row">
          <button id="showNow" class="secondary-button" type="button">Show Meme Now</button>
          <button class="primary-button" type="submit">Save Settings</button>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="dist/popup.js"></script>
  </body>
</html>
